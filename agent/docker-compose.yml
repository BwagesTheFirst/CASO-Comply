services:
  caso-agent:
    build: .
    environment:
      - CASO_API_KEY=${CASO_API_KEY}
      - TARGET_DOMAINS=${TARGET_DOMAINS:-example.gov}
      - SCAN_SCHEDULE=${SCAN_SCHEDULE:-0 2 * * *}
      - DASHBOARD_PORT=9090
    ports:
      - "9090:9090"
    volumes:
      - caso-data:/app/data
    restart: unless-stopped

volumes:
  caso-data:
