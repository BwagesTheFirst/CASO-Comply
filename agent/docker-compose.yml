# CASO Comply Agent — On-Premise Document Remediation
#
# SETUP:
#   1. Edit the volume mounts below to point at your document folders
#   2. Set your admin password
#   3. Run: docker-compose up -d
#   4. Open http://localhost:9090 to access the dashboard
#
version: "3.8"
services:
  caso-agent:
    image: caso/comply-agent:latest
    environment:
      # Admin password for the web dashboard
      - CASO_ADMIN_PASSWORD=changeme
      # Processing mode: local (on-premise), hybrid (local + AI verify), cloud (API)
      - CASO_MODE=local
      # Disable phone-home telemetry (set to true to enable usage reporting)
      - CASO_PHONE_HOME=false
      # Scan schedule (default: every hour)
      - CASO_CRON=0 * * * *
      # ── HIPAA Mode (uncomment to enable) ──
      # - CASO_HIPAA_MODE=true
      # ── Data Retention / Auto-Purge (uncomment to enable) ──
      # - CASO_PURGE_ORIGINALS_HOURS=24
      # - CASO_PURGE_REMEDIATED_HOURS=168
      # - CASO_PURGE_DB_PATHS_DAYS=90
      # - CASO_CLEANUP_ON_STARTUP=true
      # ── Vertex AI Gemini (uncomment to use instead of API key) ──
      # - CASO_GEMINI_PROVIDER=vertex
      # - CASO_GCP_PROJECT=your-gcp-project-id
      # - CASO_GCP_LOCATION=us-central1
      # - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-credentials.json
    ports:
      - "9090:9090"
    volumes:
      # Mount your document folders here. The agent will scan for PDFs inside /data/documents.
      # Example: /mnt/city-share/documents:/data/documents
      - ./documents:/data/documents
      # Where remediated (fixed) PDFs will be saved
      - ./remediated:/data/output
      # Persistent data (scan history, settings)
      - caso-data:/app/data
      # ── GCP credentials for Vertex AI (uncomment if using CASO_GEMINI_PROVIDER=vertex) ──
      # - ./gcp-credentials.json:/app/gcp-credentials.json:ro
    restart: unless-stopped

volumes:
  caso-data:
