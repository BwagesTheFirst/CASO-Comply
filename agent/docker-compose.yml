# CASO Comply Agent — On-Premise Document Remediation
#
# SETUP:
#   1. Replace CASO_LICENSE_KEY with your key from https://casocomply.com/dashboard/api-keys
#   2. Set a strong CASO_ADMIN_PASSWORD for the web dashboard
#   3. Edit the volume mounts below to point at your document folders
#   4. Run: docker compose up -d
#   5. Open http://localhost:9090 to access the dashboard
#
version: "3.8"
services:
  caso-agent:
    image: casocomply/comply-agent:latest
    environment:
      # ── REQUIRED ──
      # Your license key from https://casocomply.com/dashboard/api-keys
      - CASO_LICENSE_KEY=caso_ak_REPLACE_WITH_YOUR_KEY
      # Dashboard login password — CHANGE THIS to something secure
      - CASO_ADMIN_PASSWORD=REPLACE_WITH_SECURE_PASSWORD
      # ── Processing Mode ──
      # local  = everything on-premise, nothing leaves your network
      # hybrid = local remediation + AI quality verification (recommended)
      # cloud  = upload to CASO cloud for processing
      - CASO_MODE=hybrid
      # ── Schedule ──
      # Scan schedule (default: every hour). Use cron format.
      - CASO_CRON=0 * * * *
      # ── Optional ──
      # Disable phone-home telemetry (set to true to enable usage reporting)
      # - CASO_PHONE_HOME=false
      # ── HIPAA Mode (uncomment to enable) ──
      # - CASO_HIPAA_MODE=true
      # ── Data Retention / Auto-Purge (uncomment to enable) ──
      # - CASO_PURGE_ORIGINALS_HOURS=24
      # - CASO_PURGE_REMEDIATED_HOURS=168
      # - CASO_PURGE_DB_PATHS_DAYS=90
      # - CASO_CLEANUP_ON_STARTUP=true
      # ── Gemini AI Verification (for hybrid mode) ──
      # - CASO_GEMINI_API_KEY=your-gemini-api-key
      # ── Vertex AI Gemini (alternative to API key) ──
      # - CASO_GEMINI_PROVIDER=vertex
      # - CASO_GCP_PROJECT=your-gcp-project-id
      # - CASO_GCP_LOCATION=us-central1
      # - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-credentials.json
    ports:
      - "9090:9090"
    volumes:
      # Mount your document folders here. The agent will scan for PDFs inside /data/documents.
      # Example: /mnt/city-share/documents:/data/documents
      - ./documents:/data/documents
      # Where remediated (fixed) PDFs will be saved
      - ./remediated:/data/output
      # Persistent data (scan history, settings)
      - caso-data:/app/data
      # ── GCP credentials for Vertex AI (uncomment if using CASO_GEMINI_PROVIDER=vertex) ──
      # - ./gcp-credentials.json:/app/gcp-credentials.json:ro
    restart: unless-stopped

volumes:
  caso-data:
